version: '3.8'

services:
  # === PostgreSQL (база данных) ===
  postgres:
    image: postgres:15-alpine
    container_name: hiwork-postgres
    environment:
      POSTGRES_DB: hiwork_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === pgAdmin (удобный интерфейс для управления БД) ===
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hiwork-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hiwork.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data: