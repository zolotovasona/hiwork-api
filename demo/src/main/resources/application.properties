# === Server ===
server.port=${PORT:8080}
spring.application.name=hiwork-api

# === PostgreSQL ===
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hiwork}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA ===
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# === File Upload ===
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload-dir=./uploads

# === Static Resources ===
spring.web.resources.static-locations=file:${app.upload-dir}/,classpath:/static/

# === SMTP Mail.ru ===
spring.mail.host=smtp.mail.ru
spring.mail.port=587
spring.mail.username=hiwork.hr@mail.ru
spring.mail.password=gK337t9gz4zfdVCkKEXO
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === Profile ===
spring.profiles.active=dev

# === Logging ===
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.mail=DEBUG
